# session-manager 配置文件
# API Key 通过环境变量 ARK_API_KEY 设置

# ============================================================================
# 路径配置
# ============================================================================
paths:
  history_file: "~/.claude/history.jsonl"
  projects_dir: "~/.claude/projects"

# ============================================================================
# 搜索配置
# ============================================================================
search:
  default_limit: 20           # 默认最多显示条数
  max_display_length: 100     # 用户输入截断长度

# ============================================================================
# Embedding 向量召回配置 (Stage 1)
# ============================================================================
embedding:
  base_url: "https://ark.cn-beijing.volces.com/api/v3"
  model: "doubao-embedding-vision-251215"
  batch_size: 20              # 每批嵌入的文本数
  top_k: 30                   # 向量召回的候选数量
  similarity_threshold: 0.3   # 最低相似度阈值

# ============================================================================
# LLM 精排 + 摘要配置 (Stage 2)
# ============================================================================
rerank:
  base_url: "https://ark.cn-beijing.volces.com/api/v3"
  model: "glm-4-7-251222"
  timeout: 30
  temperature: 0.3
  max_candidates: 15          # 送入 LLM 精排的最大候选数
